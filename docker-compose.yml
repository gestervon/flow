services:
  client:
    build: ./client

  server:
    build: ./server
    environment:
      MONGO_URL: mongodb://mongo:27017/test
      JWT_SECRET: secret
    depends_on:
      - mongo

  mongo:
    image: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - server

volumes:
  mongo-data:
